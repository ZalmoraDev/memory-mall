name: memory-mall

volumes:
  postgres_vol: { }

services:
  # Use `docker compose exec mm-express npm run 'command'` to run the drizzle-orm CLI
  # commands from /backend/package.json inside the postgres container
  express:
    container_name: mm-express
    build:
      context: .
      dockerfile: express.dockerfile # image: node:24
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./backend:/app
    env_file:
      - ./.env
    restart: no
    depends_on:
      - postgres

  nuxt:
    container_name: mm-nuxt
    build:
      context: .
      dockerfile: nuxt.dockerfile # image: node:24
    ports:
      - "3001:3000"
    command: npm run dev
    volumes:
      - ./frontend:/app
    env_file:
      - ./.env
    restart: no
    depends_on:
      - express

  postgres:
    container_name: mm-postgres
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: MemoryMallDB
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: database123
    volumes:
      - postgres_vol:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d/ # Import all drizzle-orm migrations on first init
    restart: no

  pg-admin:
    container_name: mm-pgadmin
    image: dpage/pgadmin4:9
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - ./backend/src/db/servers.json:/pgadmin4/servers.json
    restart: no
    depends_on:
      - postgres